services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: conecta_indicadores
      POSTGRES_USER: conecta
      POSTGRES_PASSWORD: conecta123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conecta -d conecta_indicadores"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://conecta:conecta123@postgres:5432/conecta_indicadores
      SICONFI_BASE_URL: https://apidatalake.tesouro.gov.br/ords/siconfi/tt
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/src/main"

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  pgdata:
